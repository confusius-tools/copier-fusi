_subdirectory: template
_answers_file: .copier-answers.yml
_exclude:
  - "{% if not include_docs %}docs{% endif %}"
  - "{% if not include_docs %}zensical.toml.jinja{% endif %}"

project_name:
  type: str
  help: Human-readable project name (e.g. "fUSI Analysis")

project_slug:
  type: str
  help: Repository and directory name (e.g. "my-fusi-analysis")
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

package_name:
  type: str
  help: Python package name (e.g. "my_fusi_analysis")
  default: "{{ project_slug | replace('-', '_') }}"

description:
  type: str
  help: Short one-line project description

author_name:
  type: str
  help: Your full name

author_email:
  type: str
  help: Your email address

python_version:
  type: str
  help: Python version to target (e.g. "3.13")
  default: "3.13"

data_root:
  type: str
  help: Path to the root data directory (can be changed later in config.toml)
  default: "/data"

results_root:
  type: str
  help: Path to the results directory (can be changed later in config.toml)
  default: "./results"

include_docs:
  type: bool
  help: Include documentation setup (Zensical + mkdocstrings)?
  default: false
